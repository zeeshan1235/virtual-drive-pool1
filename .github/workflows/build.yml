name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36 buildozer
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev

    - name: Accept Android SDK Licenses
      run: |
        mkdir -p "$HOME/.android"
        touch "$HOME/.android/repositories.cfg"
        yes | sdkmanager --licenses || true

    - name: Build with Buildozer
      run: |
        buildozer android debug
      env:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false"
